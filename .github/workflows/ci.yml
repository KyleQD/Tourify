name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  NODE_VERSION: '20'

jobs:
  checks:
    name: Lint And Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Mobile redirect safety test
        run: npm run test:mobile-redirect

      - name: Auth callback redirect smoke test
        run: npm run test:auth-redirects

      - name: Venue operations safeguard test
        run: npm run test:venue-ops

      - name: Build
        run: npm run build:vercel
