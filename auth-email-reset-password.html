<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset your Tourify password</title>
    <style>
      body { margin: 0; padding: 24px; background: #0f172a; color: #e2e8f0; font-family: Arial, sans-serif; }
      .card { max-width: 600px; margin: 0 auto; background: #111827; border: 1px solid #334155; border-radius: 14px; padding: 28px; }
      h1 { margin: 0 0 10px; font-size: 26px; color: #f8fafc; }
      p { line-height: 1.6; color: #cbd5e1; }
      .button { display: inline-block; margin: 20px 0; padding: 12px 20px; border-radius: 10px; text-decoration: none; color: #fff; background: linear-gradient(135deg, #7c3aed, #2563eb); font-weight: 700; }
      .small { font-size: 13px; color: #94a3b8; word-break: break-all; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Reset your password</h1>
      <p>We received a password reset request for your Tourify account.</p>
      <p><a class="button" href="{{ .ConfirmationURL }}">Reset password</a></p>
      <p class="small">If you did not request this, you can safely ignore this email.</p>
      <p class="small">{{ .ConfirmationURL }}</p>
    </div>
  </body>
</html>
